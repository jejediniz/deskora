<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>OperaDesk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="OperaDesk centraliza abertura, acompanhamento e gestão de chamados de TI."
    />
    <meta name="theme-color" content="#1d4ed8" />
    <script>
      (function () {
        try {
          var k = "@operadesk:theme";
          if (localStorage.getItem(k) === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
